<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DarkChess｜象棋暗棋</title>
    <meta name="description" content="DarkChess 是一個以 Vue 3 製作的暗棋小遊戲，支援雙人與人機對戰、棋盤樣式與貓咪棋子主題切換。">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main id="app" class="app-shell">
      <section class="game-layout">
        <aside class="control-panel">
          <div class="brand-block">
            <span class="brand-mark">暗</span>
            <div>
              <h1>DarkChess</h1>
              <p>貓咪主題的輕量暗棋對戰，翻棋、佈局、隔山打炮。</p>
            </div>
          </div>

          <div class="panel-section">
            <label class="form-label">遊戲模式</label>
            <div class="segmented-control" role="group" aria-label="遊戲模式">
              <button
                class="segment-button"
                :class="{ active: gameMode === 'pvp' }"
                type="button"
                @click="setMode('pvp')"
                :disabled="gameStatus === 'playing'"
              >
                雙人
              </button>
              <button
                class="segment-button"
                :class="{ active: gameMode === 'pve' }"
                type="button"
                @click="setMode('pve')"
                :disabled="gameStatus === 'playing'"
              >
                人機
              </button>
            </div>
          </div>

          <div class="panel-section" v-if="gameMode === 'pve'">
            <label class="form-label" for="difficulty">電腦難度</label>
            <select
              id="difficulty"
              class="form-select"
              v-model="difficulty"
              :disabled="gameStatus === 'playing'"
            >
              <option value="easy">簡單</option>
              <option value="normal">普通</option>
              <option value="hard">困難</option>
            </select>
          </div>

          <div class="panel-section">
            <label class="form-label">棋盤樣式</label>
            <div class="segmented-control" role="group" aria-label="棋盤樣式">
              <button
                class="segment-button"
                :class="{ active: boardTheme === 'classic' }"
                type="button"
                @click="setBoardTheme('classic')"
              >
                基本棋盤
              </button>
              <button
                class="segment-button"
                :class="{ active: boardTheme === 'wood' }"
                type="button"
                @click="setBoardTheme('wood')"
              >
                木質棋盤
              </button>
            </div>
          </div>

          <div class="panel-section">
            <label class="form-label">棋子樣式</label>
            <div class="segmented-control" role="group" aria-label="棋子樣式">
              <button
                class="segment-button"
                :class="{ active: pieceTheme === 'classic' }"
                type="button"
                @click="setPieceTheme('classic')"
              >
                傳統
              </button>
              <button
                class="segment-button"
                :class="{ active: pieceTheme === 'cat' }"
                type="button"
                @click="setPieceTheme('cat')"
              >
                貓咪
              </button>
            </div>
          </div>

          <div class="panel-section status-stack">
            <div class="status-row">
              <span>狀態</span>
              <strong>{{ statusText }}</strong>
            </div>
            <div class="status-row">
              <span>目前回合</span>
              <strong>{{ turnText }}</strong>
            </div>
            <div class="status-row" v-if="gameMode === 'pve'">
              <span>先手抽籤</span>
              <strong>{{ firstPlayerText }}</strong>
            </div>
            <div class="status-row">
              <span>陣營</span>
              <strong>{{ colorAssignmentText }}</strong>
            </div>
          </div>

          <div class="panel-section">
            <button class="btn btn-dark w-100" type="button" @click="startGame">
              {{ gameStatus === 'setup' ? '開始遊戲' : '重新開始' }}
            </button>
          </div>

          <div class="panel-section captured-panel">
            <div>
              <span class="capture-label red-text">紅方剩餘</span>
              <strong>{{ remainingCount.red }}</strong>
            </div>
            <div>
              <span class="capture-label black-text">黑方剩餘</span>
              <strong>{{ remainingCount.black }}</strong>
            </div>
          </div>

          <p class="rule-note">
            炮需隔一顆棋直線攻擊；兵卒可吃將帥，將帥不可吃兵卒。
          </p>
        </aside>

        <section class="board-stage">
          <div class="table-top">
            <div class="game-message" :class="{ win: gameStatus === 'ended' }">
              {{ message }}
            </div>

            <div
              class="board-wrap"
              ref="boardWrap"
              :class="{
                'board-classic': boardTheme === 'classic',
                'board-wood': boardTheme === 'wood',
                'piece-theme-cat': pieceTheme === 'cat'
              }"
              aria-label="象棋暗棋棋盤"
            >
              <button
                v-for="(cell, index) in board"
                :key="cell.id"
                class="board-cell"
                :class="cellClasses(cell, index)"
                :data-cell-index="index"
                type="button"
                @click="handleCellClick(index)"
                :disabled="isBoardDisabled"
                :aria-label="cellAriaLabel(cell, index)"
              >
                <span v-if="!cell.piece" class="empty-dot"></span>
                <span
                  v-else-if="cell.revealing"
                  class="piece-flip"
                  @animationend="handleAnimationEnd('reveal')"
                >
                  <span
                    class="piece-flip-side piece-flip-back piece-back"
                    :class="{ 'cat-piece-back': pieceTheme === 'cat' }"
                  >
                    <img
                      v-if="pieceTheme === 'cat'"
                      :src="pieceBackPath"
                      alt="貓掌暗棋蓋牌"
                      draggable="false"
                    >
                    <template v-else>暗</template>
                  </span>
                  <span
                    class="piece-flip-side piece-flip-front piece-face"
                    :class="[cell.piece.color, { 'cat-piece': pieceTheme === 'cat' }]"
                  >
                    <img
                      v-if="pieceTheme === 'cat'"
                      :src="pieceAssetPath(cell.piece)"
                      :alt="pieceAltText(cell.piece)"
                      draggable="false"
                    >
                    <template v-else>{{ cell.piece.label }}</template>
                  </span>
                </span>
                <span
                  v-else-if="!cell.revealed"
                  class="piece-back"
                  :class="{ 'cat-piece-back': pieceTheme === 'cat' }"
                >
                  <img
                    v-if="pieceTheme === 'cat'"
                    :src="pieceBackPath"
                    alt="貓掌暗棋蓋牌"
                    draggable="false"
                  >
                  <template v-else>暗</template>
                </span>
                <span
                  v-else
                  class="piece-face"
                  :class="[cell.piece.color, { 'cat-piece': pieceTheme === 'cat' }]"
                >
                  <img
                    v-if="pieceTheme === 'cat'"
                    :src="pieceAssetPath(cell.piece)"
                    :alt="pieceAltText(cell.piece)"
                    draggable="false"
                  >
                  <template v-else>{{ cell.piece.label }}</template>
                </span>
                <span
                  v-if="animation.type === 'capture' && animation.from === index"
                  class="capture-source-cover"
                ></span>
              </button>

              <span
                v-if="animation.type === 'capture' && animation.overlayStyle"
                class="capture-overlay"
                :style="animation.overlayStyle"
                @animationend="handleAnimationEnd('capture')"
              >
                <span
                  class="piece-face capture-overlay-piece"
                  :class="[animation.attacker.color, { 'cat-piece': pieceTheme === 'cat' }]"
                >
                  <img
                    v-if="pieceTheme === 'cat'"
                    :src="pieceAssetPath(animation.attacker)"
                    :alt="pieceAltText(animation.attacker)"
                    draggable="false"
                  >
                  <template v-else>{{ animation.attacker.label }}</template>
                </span>
              </span>
            </div>

            <div class="legend-row">
              <span><i class="legend-box selected"></i>已選取</span>
              <span><i class="legend-box legal"></i>可行動</span>
              <span><i class="legend-box hint"></i>蓋牌</span>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
