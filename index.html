<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>象棋暗棋</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main id="app" class="app-shell">
      <section class="game-layout">
        <aside class="control-panel">
          <div class="brand-block">
            <span class="brand-mark">暗</span>
            <div>
              <h1>象棋暗棋</h1>
              <p>翻棋、佈局、隔山打炮。</p>
            </div>
          </div>

          <div class="panel-section">
            <label class="form-label">遊戲模式</label>
            <div class="segmented-control" role="group" aria-label="遊戲模式">
              <button
                class="segment-button"
                :class="{ active: gameMode === 'pvp' }"
                type="button"
                @click="setMode('pvp')"
                :disabled="gameStatus === 'playing'"
              >
                雙人
              </button>
              <button
                class="segment-button"
                :class="{ active: gameMode === 'pve' }"
                type="button"
                @click="setMode('pve')"
                :disabled="gameStatus === 'playing'"
              >
                人機
              </button>
            </div>
          </div>

          <div class="panel-section" v-if="gameMode === 'pve'">
            <label class="form-label" for="difficulty">電腦難度</label>
            <select
              id="difficulty"
              class="form-select"
              v-model="difficulty"
              :disabled="gameStatus === 'playing'"
            >
              <option value="easy">簡單</option>
              <option value="normal">普通</option>
              <option value="hard">困難</option>
            </select>
          </div>

          <div class="panel-section status-stack">
            <div class="status-row">
              <span>狀態</span>
              <strong>{{ statusText }}</strong>
            </div>
            <div class="status-row">
              <span>目前回合</span>
              <strong>{{ turnText }}</strong>
            </div>
            <div class="status-row" v-if="gameMode === 'pve'">
              <span>先手抽籤</span>
              <strong>{{ firstPlayerText }}</strong>
            </div>
            <div class="status-row">
              <span>陣營</span>
              <strong>{{ colorAssignmentText }}</strong>
            </div>
          </div>

          <div class="panel-section">
            <button class="btn btn-dark w-100" type="button" @click="startGame">
              {{ gameStatus === 'setup' ? '開始遊戲' : '重新開始' }}
            </button>
          </div>

          <div class="panel-section captured-panel">
            <div>
              <span class="capture-label red-text">紅方剩餘</span>
              <strong>{{ remainingCount.red }}</strong>
            </div>
            <div>
              <span class="capture-label black-text">黑方剩餘</span>
              <strong>{{ remainingCount.black }}</strong>
            </div>
          </div>

          <p class="rule-note">
            炮需隔一顆棋直線攻擊；兵卒可吃將帥，將帥不可吃兵卒。
          </p>
        </aside>

        <section class="board-stage">
          <div class="table-top">
            <div class="game-message" :class="{ win: gameStatus === 'ended' }">
              {{ message }}
            </div>

            <div class="board-wrap" aria-label="象棋暗棋棋盤">
              <button
                v-for="(cell, index) in board"
                :key="cell.id"
                class="board-cell"
                :class="cellClasses(cell, index)"
                type="button"
                @click="handleCellClick(index)"
                :disabled="isBoardDisabled"
                :aria-label="cellAriaLabel(cell, index)"
              >
                <span v-if="!cell.piece" class="empty-dot"></span>
                <span v-else-if="!cell.revealed" class="piece-back">暗</span>
                <span v-else class="piece-face" :class="cell.piece.color">
                  {{ cell.piece.label }}
                </span>
              </button>
            </div>

            <div class="legend-row">
              <span><i class="legend-box selected"></i>已選取</span>
              <span><i class="legend-box legal"></i>可行動</span>
              <span><i class="legend-box hint"></i>蓋牌</span>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
